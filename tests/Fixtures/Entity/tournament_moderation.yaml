App\Common\Entity\User:
    user_creator:
        email: 'creator@example.com'
        googleId: 'google_creator_123'
        roles: []
        player: '@player_franko'

App\Classic\Entity\Tournament:
    tournament_pending:
        name: 'Турнір на модерації'
        status: '<(App\Classic\Enum\TournamentStatus::Draft)>'
        createdBy: '@player_franko'
    tournament_no_claim:
        name: 'Турнір без заявки'
        status: '<(App\Classic\Enum\TournamentStatus::Draft)>'
        createdBy: '@player_franko'
    tournament_approved_mod:
        name: 'Схвалений турнір мод'
        status: '<(App\Classic\Enum\TournamentStatus::Draft)>'
        createdBy: '@player_franko'

App\Classic\Entity\TournamentOfficial:
    official_pending_org:
        tournament: '@tournament_pending'
        player: '@player_franko'
        role: '<(App\Classic\Enum\TournamentOfficialRole::Organizer)>'

App\Classic\Entity\TournamentModerationClaim:
    claim_pending_tournament:
        tournament: '@tournament_pending'
        status: '<(App\Classic\Enum\TournamentModerationStatus::Pending)>'
        createdAt: '<(new \DateTimeImmutable())>'
    claim_approved_tournament:
        tournament: '@tournament_approved_mod'
        status: '<(App\Classic\Enum\TournamentModerationStatus::Approved)>'
        createdAt: '<(new \DateTimeImmutable("-1 day"))>'
        resolvedAt: '<(new \DateTimeImmutable())>'
