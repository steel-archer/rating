App\Entity\Tournament:
    tournament_spring:
        name: 'Весняний кубок'
        season: '@season_current'
        startedAt: '<(new \DateTimeImmutable("2025-03-01"))>'
        endedAt: '<(new \DateTimeImmutable("2025-03-15"))>'
        toursCount: 3
        questionsPerTour: 12
        difficulty: 3.5
        trueDl: 2.8
        status: '<(App\Enum\TournamentStatus::Published)>'
    tournament_autumn:
        name: 'Осінній бриз'
        season: '@season_current'
        startedAt: '<(new \DateTimeImmutable("2024-10-10"))>'
        endedAt: '<(new \DateTimeImmutable("2024-10-20"))>'
        toursCount: 4
        questionsPerTour: 15
        difficulty: 4.2
        trueDl: 3.1
        status: '<(App\Enum\TournamentStatus::Published)>'

App\Entity\TournamentOfficial:
    official_organizer:
        tournament: '@tournament_spring'
        player: '@player_shevchenko'
        role: '<(App\Enum\TournamentOfficialRole::Organizer)>'
    official_editor:
        tournament: '@tournament_spring'
        player: '@player_franko'
        role: '<(App\Enum\TournamentOfficialRole::Editor)>'

App\Entity\TournamentSession:
    session_spring_kyiv:
        tournament: '@tournament_spring'
        venue: '@venue_kyiv'
        representative: '@player_shevchenko'
        host: '@player_lesya'
        playedAt: '<(new \DateTimeImmutable("2025-03-01 19:00"))>'
    session_spring_lviv:
        tournament: '@tournament_spring'
        venue: '@venue_lviv'
        representative: '@player_franko'
        host: null
        playedAt: '<(new \DateTimeImmutable("2025-03-01 19:00"))>'
    session_autumn_kyiv:
        tournament: '@tournament_autumn'
        venue: '@venue_kyiv'
        representative: '@player_shevchenko'
        host: '@player_lesya'
        playedAt: '<(new \DateTimeImmutable("2024-10-10 19:00"))>'

App\Entity\TeamPlayer:
    team_player_alpha_shevchenko:
        team: '@team_alpha'
        player: '@player_shevchenko'
        season: '@season_current'
        isCaptain: true
    team_player_alpha_lesya:
        team: '@team_alpha'
        player: '@player_lesya'
        season: '@season_current'
        isCaptain: false
    team_player_beta_franko:
        team: '@team_beta'
        player: '@player_franko'
        season: '@season_current'
        isCaptain: true

App\Entity\TournamentSessionTeam:
    session_team_spring_alpha:
        tournamentSession: '@session_spring_kyiv'
        team: '@team_alpha'
        score: 25
    session_team_spring_beta:
        tournamentSession: '@session_spring_lviv'
        team: '@team_beta'
        score: 30
        oneTimeName: 'Зоряні Леви'
    session_team_spring_gamma:
        tournamentSession: '@session_spring_kyiv'
        team: '@team_gamma'
        score: 20
    session_team_autumn_alpha:
        tournamentSession: '@session_autumn_kyiv'
        team: '@team_alpha'
        score: 40

App\Entity\TournamentSessionTeamAnswer:
    answer_spring_alpha_{1..25}:
        tournamentSessionTeam: '@session_team_spring_alpha'
        questionNumber: '<current()>'
        isCorrect: true
    answer_spring_alpha_no_{1..11}:
        tournamentSessionTeam: '@session_team_spring_alpha'
        questionNumber: '<($current + 25)>'
        isCorrect: false
    answer_spring_beta_{1..30}:
        tournamentSessionTeam: '@session_team_spring_beta'
        questionNumber: '<current()>'
        isCorrect: true
    answer_spring_beta_no_{1..6}:
        tournamentSessionTeam: '@session_team_spring_beta'
        questionNumber: '<($current + 30)>'
        isCorrect: false
    answer_spring_gamma_{1..20}:
        tournamentSessionTeam: '@session_team_spring_gamma'
        questionNumber: '<current()>'
        isCorrect: true
    answer_spring_gamma_no_{1..16}:
        tournamentSessionTeam: '@session_team_spring_gamma'
        questionNumber: '<($current + 20)>'
        isCorrect: false
    answer_autumn_alpha_{1..40}:
        tournamentSessionTeam: '@session_team_autumn_alpha'
        questionNumber: '<current()>'
        isCorrect: true
    answer_autumn_alpha_no_{1..20}:
        tournamentSessionTeam: '@session_team_autumn_alpha'
        questionNumber: '<($current + 40)>'
        isCorrect: false

App\Entity\TournamentSessionTeamPlayer:
    stp_spring_alpha_shevchenko:
        tournamentSessionTeam: '@session_team_spring_alpha'
        player: '@player_shevchenko'
        isLegionary: false
    stp_spring_alpha_lesya:
        tournamentSessionTeam: '@session_team_spring_alpha'
        player: '@player_lesya'
        isLegionary: false
    stp_spring_beta_franko:
        tournamentSessionTeam: '@session_team_spring_beta'
        player: '@player_franko'
        isLegionary: false
    stp_spring_gamma_shevchenko:
        tournamentSessionTeam: '@session_team_spring_gamma'
        player: '@player_shevchenko'
        isLegionary: true

App\Entity\SessionClaim:
    session_claim_spring_kyiv:
        session: '@session_spring_kyiv'
        player: '@player_shevchenko'
        status: '<(App\Enum\SessionClaimStatus::Approved)>'
        createdAt: '<(new \DateTimeImmutable("2025-02-20"))>'
        resolvedAt: '<(new \DateTimeImmutable("2025-02-21"))>'
    session_claim_spring_lviv:
        session: '@session_spring_lviv'
        player: '@player_franko'
        status: '<(App\Enum\SessionClaimStatus::Approved)>'
        createdAt: '<(new \DateTimeImmutable("2025-02-20"))>'
        resolvedAt: '<(new \DateTimeImmutable("2025-02-21"))>'
    session_claim_autumn_kyiv:
        session: '@session_autumn_kyiv'
        player: '@player_shevchenko'
        status: '<(App\Enum\SessionClaimStatus::Approved)>'
        createdAt: '<(new \DateTimeImmutable("2024-10-05"))>'
        resolvedAt: '<(new \DateTimeImmutable("2024-10-06"))>'
