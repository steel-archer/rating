App\Entity\Tournament:
    tournament_spring:
        name: 'Весняний кубок'
        season: '@season_current'
        startedAt: '<(new DateTime("2025-03-01"))>'
        endedAt: '<(new DateTime("2025-03-15"))>'
        toursCount: 3
        questionsPerTour: 12
        difficulty: 3.5
        trueDl: 2.8
    tournament_autumn:
        name: 'Осінній бриз'
        season: '@season_current'
        startedAt: '<(new DateTime("2024-10-10"))>'
        endedAt: '<(new DateTime("2024-10-20"))>'
        toursCount: 4
        questionsPerTour: 15
        difficulty: 4.2
        trueDl: 3.1

App\Entity\TournamentOfficial:
    official_organizer:
        tournament: '@tournament_spring'
        player: '@player_shevchenko'
        role: '<(App\Entity\TournamentOfficialRole::Organizer)>'
    official_editor:
        tournament: '@tournament_spring'
        player: '@player_franko'
        role: '<(App\Entity\TournamentOfficialRole::Editor)>'

App\Entity\TournamentSession:
    session_spring_kyiv:
        tournament: '@tournament_spring'
        venue: '@venue_kyiv'
        representative: '@player_shevchenko'
        host: '@player_lesya'
        playedAt: '<(new DateTime("2025-03-01 19:00"))>'
    session_spring_lviv:
        tournament: '@tournament_spring'
        venue: '@venue_lviv'
        representative: '@player_franko'
        host: null
        playedAt: '<(new DateTime("2025-03-01 19:00"))>'
    session_autumn_kyiv:
        tournament: '@tournament_autumn'
        venue: '@venue_kyiv'
        representative: '@player_shevchenko'
        host: '@player_lesya'
        playedAt: '<(new DateTime("2024-10-10 19:00"))>'

App\Entity\TeamPlayer:
    team_player_alpha_shevchenko:
        team: '@team_alpha'
        player: '@player_shevchenko'
        season: '@season_current'
        isCaptain: true
    team_player_alpha_lesya:
        team: '@team_alpha'
        player: '@player_lesya'
        season: '@season_current'
        isCaptain: false
    team_player_beta_franko:
        team: '@team_beta'
        player: '@player_franko'
        season: '@season_current'
        isCaptain: true

App\Entity\TournamentSessionTeam:
    session_team_spring_alpha:
        tournamentSession: '@session_spring_kyiv'
        team: '@team_alpha'
        score: 25
    session_team_spring_beta:
        tournamentSession: '@session_spring_lviv'
        team: '@team_beta'
        score: 30
    session_team_spring_gamma:
        tournamentSession: '@session_spring_kyiv'
        team: '@team_gamma'
        score: 20
    session_team_autumn_alpha:
        tournamentSession: '@session_autumn_kyiv'
        team: '@team_alpha'
        score: 40

App\Entity\TournamentSessionTeamPlayer:
    stp_spring_alpha_shevchenko:
        tournamentSessionTeam: '@session_team_spring_alpha'
        player: '@player_shevchenko'
        isLegionary: false
    stp_spring_alpha_lesya:
        tournamentSessionTeam: '@session_team_spring_alpha'
        player: '@player_lesya'
        isLegionary: false
    stp_spring_beta_franko:
        tournamentSessionTeam: '@session_team_spring_beta'
        player: '@player_franko'
        isLegionary: false
    stp_spring_gamma_shevchenko:
        tournamentSessionTeam: '@session_team_spring_gamma'
        player: '@player_shevchenko'
        isLegionary: true
