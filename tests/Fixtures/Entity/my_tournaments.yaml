App\Common\Entity\User:
    user_creator:
        email: 'creator@example.com'
        googleId: 'google_creator_123'
        roles: []
        player: '@player_franko'

App\Classic\Entity\Tournament:
    tournament_draft:
        name: 'Мій чернетковий турнір'
        status: '<(App\Classic\Enum\TournamentStatus::Draft)>'
        createdBy: '@player_franko'
    tournament_approved:
        name: 'Схвалений турнір'
        status: '<(App\Classic\Enum\TournamentStatus::Draft)>'
        createdBy: '@player_franko'
        season: '@season_current'
        startedAt: '<(new \DateTimeImmutable("+30 days 00:00:00"))>'
        endedAt: '<(new \DateTimeImmutable("+31 days 00:00:00"))>'
        resultsHiddenUntil: '<(new \DateTimeImmutable("+32 days 00:00:00"))>'
        registrationDeadline: '<(new \DateTimeImmutable("+31 days 00:00:00"))>'
        detailsHiddenUntil: '<(new \DateTimeImmutable("+33 days 00:00:00"))>'
        submissionDeadline: '<(new \DateTimeImmutable("+32 days 00:00:00"))>'
        appealDeadline: '<(new \DateTimeImmutable("+34 days 00:00:00"))>'
        toursCount: 3
        questionsPerTour: 12
        difficulty: 3.5
    tournament_published:
        name: 'Опублікований турнір'
        status: '<(App\Classic\Enum\TournamentStatus::Published)>'
        createdBy: '@player_franko'
        season: '@season_current'
        startedAt: '<(new \DateTimeImmutable("+60 days 00:00:00"))>'
        endedAt: '<(new \DateTimeImmutable("+61 days 00:00:00"))>'
        resultsHiddenUntil: '<(new \DateTimeImmutable("+62 days 00:00:00"))>'
        registrationDeadline: '<(new \DateTimeImmutable("+61 days 00:00:00"))>'
        detailsHiddenUntil: '<(new \DateTimeImmutable("+63 days 00:00:00"))>'
        submissionDeadline: '<(new \DateTimeImmutable("+62 days 00:00:00"))>'
        appealDeadline: '<(new \DateTimeImmutable("+64 days 00:00:00"))>'
        toursCount: 3
        questionsPerTour: 12
        difficulty: 4.0

