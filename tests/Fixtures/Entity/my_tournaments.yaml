        role: '<(App\Classic\Enum\TournamentOfficialRole::Organizer)>'
    official_approved_org:
        tournament: '@tournament_approved'
        player: '@player_franko'
        role: '<(App\Classic\Enum\TournamentOfficialRole::Organizer)>'
    official_approved_editor:
        tournament: '@tournament_approved'
        player: '@player_franko'
        role: '<(App\Classic\Enum\TournamentOfficialRole::Editor)>'
    official_approved_game_jury:
        tournament: '@tournament_approved'
        player: '@player_lesya'
        role: '<(App\Classic\Enum\TournamentOfficialRole::GameJury)>'
    official_approved_appeal_jury:
        tournament: '@tournament_approved'
        player: '@player_franko'
        role: '<(App\Classic\Enum\TournamentOfficialRole::AppealJury)>'
    official_published_org:
        tournament: '@tournament_published'
        player: '@player_franko'
        role: '<(App\Classic\Enum\TournamentOfficialRole::Organizer)>'
    official_published_editor:
        tournament: '@tournament_published'
        player: '@player_franko'
        role: '<(App\Classic\Enum\TournamentOfficialRole::Editor)>'
    official_published_game_jury:
        tournament: '@tournament_published'
        player: '@player_lesya'
