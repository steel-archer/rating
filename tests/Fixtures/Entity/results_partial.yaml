App\Entity\User:
    user_results_partial_rep:
        email: 'results_partial_rep@example.com'
        googleId: 'google_results_partial_rep'
        roles: []
        player: '@player_shevchenko'

App\Entity\Tournament:
    tournament_results_partial:
        name: 'Турнір з частковими результатами'
        status: '<(App\Enum\TournamentStatus::Published)>'
        season: '@season_current'
        startedAt: '<(new \DateTimeImmutable("-30 days"))>'
        endedAt: '<(new \DateTimeImmutable("+30 days"))>'
        toursCount: 2
        questionsPerTour: 3

App\Entity\TournamentSession:
    session_results_partial:
        tournament: '@tournament_results_partial'
        venue: '@venue_kyiv'
        representative: '@player_shevchenko'
        playedAt: '<(new \DateTimeImmutable("-1 day"))>'
        estimatedTeams: 2

App\Entity\SessionClaim:
    claim_results_partial:
        session: '@session_results_partial'
        player: '@player_shevchenko'
        status: '<(App\Enum\SessionClaimStatus::Approved)>'
        createdAt: '<(new \DateTimeImmutable("-5 days"))>'
        resolvedAt: '<(new \DateTimeImmutable("-4 days"))>'

App\Entity\TournamentSessionTeam:
    session_team_partial_alpha:
        tournamentSession: '@session_results_partial'
        team: '@team_alpha'
        score: 4
    session_team_partial_beta:
        tournamentSession: '@session_results_partial'
        team: '@team_beta'
        score: 0

App\Entity\TournamentSessionTeamAnswer:
    answer_partial_alpha_{1..4}:
        tournamentSessionTeam: '@session_team_partial_alpha'
        questionNumber: '<current()>'
        isCorrect: true
    answer_partial_alpha_no_{1..2}:
        tournamentSessionTeam: '@session_team_partial_alpha'
        questionNumber: '<($current + 4)>'
        isCorrect: false
