App\Common\Entity\User:
    user_venue_creator:
        email: 'venue_creator@example.com'
        googleId: 'google_venue_creator'
        roles: []
        player: '@player_franko'

App\Common\Entity\Venue:
    venue_pending:
        name: 'Новий майданчик'
        town: '@town_kyiv'
        createdBy: '@player_franko'
        isApproved: false
        createdAt: '<(new \DateTimeImmutable())>'
    venue_approved_owned:
        name: 'Мій схвалений майданчик'
        town: '@town_lviv'
        createdBy: '@player_franko'
        isApproved: true
        createdAt: '<(new \DateTimeImmutable("-1 day"))>'
    venue_online_existing:
        name: 'Існуючий онлайн-майданчик'
        town: '@town_online'
        createdBy: '@player_franko'
        isOnline: true
        isApproved: false
        createdAt: '<(new \DateTimeImmutable())>'

App\Common\Entity\VenueRepresentative:
    rep_pending:
        venue: '@venue_pending'
        player: '@player_franko'
        createdAt: '<(new \DateTimeImmutable())>'
    rep_approved:
        venue: '@venue_approved_owned'
        player: '@player_franko'
        createdAt: '<(new \DateTimeImmutable("-1 day"))>'
