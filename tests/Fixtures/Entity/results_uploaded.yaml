App\Entity\User:
    user_results_uploaded_rep:
        email: 'results_uploaded_rep@example.com'
        googleId: 'google_results_uploaded_rep'
        roles: []
        player: '@player_shevchenko'

App\Entity\Tournament:
    tournament_results_uploaded:
        name: 'Турнір із завантаженими результатами'
        status: '<(App\Enum\TournamentStatus::Published)>'
        season: '@season_current'
        startedAt: '<(new \DateTimeImmutable("-30 days 00:00:00"))>'
        endedAt: '<(new \DateTimeImmutable("+30 days 00:00:00"))>'
        submissionDeadline: '<(new \DateTimeImmutable("+1 year 00:00:00"))>'
        toursCount: 2
        questionsPerTour: 3

App\Entity\TournamentSession:
    session_results_uploaded:
        tournament: '@tournament_results_uploaded'
        venue: '@venue_kyiv'
        representative: '@player_shevchenko'
        playedAt: '<(new \DateTimeImmutable("-1 day"))>'
        estimatedTeams: 2

App\Entity\SessionClaim:
    claim_results_uploaded:
        session: '@session_results_uploaded'
        player: '@player_shevchenko'
        status: '<(App\Enum\SessionClaimStatus::Approved)>'
        createdAt: '<(new \DateTimeImmutable("-5 days"))>'
        resolvedAt: '<(new \DateTimeImmutable("-4 days"))>'

App\Entity\TournamentSessionTeam:
    session_team_uploaded_alpha:
        tournamentSession: '@session_results_uploaded'
        team: '@team_alpha'
        score: 4
    session_team_uploaded_beta:
        tournamentSession: '@session_results_uploaded'
        team: '@team_beta'
        score: 3

App\Entity\TournamentSessionTeamAnswer:
    answer_uploaded_alpha_{1..4}:
        tournamentSessionTeam: '@session_team_uploaded_alpha'
        questionNumber: '<current()>'
        isCorrect: true
    answer_uploaded_alpha_no_{1..2}:
        tournamentSessionTeam: '@session_team_uploaded_alpha'
        questionNumber: '<($current + 4)>'
        isCorrect: false
    answer_uploaded_beta_{1..3}:
        tournamentSessionTeam: '@session_team_uploaded_beta'
        questionNumber: '<current()>'
        isCorrect: true
    answer_uploaded_beta_no_{1..3}:
        tournamentSessionTeam: '@session_team_uploaded_beta'
        questionNumber: '<($current + 3)>'
        isCorrect: false
