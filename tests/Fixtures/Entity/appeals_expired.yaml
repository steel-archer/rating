App\Common\Entity\User:
    user_appeal_expired_player:
        email: 'appeal_expired@example.com'
        googleId: 'google_appeal_expired'
        roles: []
        player: '@player_shevchenko'

App\Classic\Entity\Tournament:
    tournament_appeal_expired:
        name: 'Турнір з минулим дедлайном'
        status: '<(App\Classic\Enum\TournamentStatus::Published)>'
        season: '@season_current'
        startedAt: '<(new \DateTimeImmutable("-60 days 00:00:00"))>'
        endedAt: '<(new \DateTimeImmutable("-50 days 00:00:00"))>'
        submissionDeadline: '<(new \DateTimeImmutable("-40 days 00:00:00"))>'
        appealDeadline: '<(new \DateTimeImmutable("-30 days 00:00:00"))>'
        toursCount: 1
        questionsPerTour: 3

App\Classic\Entity\TournamentOfficial:
    official_expired_organizer:
        tournament: '@tournament_appeal_expired'
        player: '@player_franko'
        role: '<(App\Classic\Enum\TournamentOfficialRole::Organizer)>'

App\Classic\Entity\TournamentSession:
    session_appeal_expired:
        tournament: '@tournament_appeal_expired'
        venue: '@venue_kyiv'
        representative: '@player_shevchenko'
        playedAt: '<(new \DateTimeImmutable("-55 days"))>'
        estimatedTeams: 1

App\Classic\Entity\SessionClaim:
    claim_appeal_expired:
        session: '@session_appeal_expired'
        player: '@player_shevchenko'
        status: '<(App\Classic\Enum\SessionClaimStatus::Approved)>'
        createdAt: '<(new \DateTimeImmutable("-65 days"))>'
        resolvedAt: '<(new \DateTimeImmutable("-64 days"))>'

App\Classic\Entity\TournamentSessionTeam:
    session_team_expired_alpha:
        tournamentSession: '@session_appeal_expired'
        team: '@team_alpha'
        score: 1
        resultsSubmitted: true

App\Classic\Entity\TournamentSessionTeamPlayer:
    session_team_player_expired:
        tournamentSessionTeam: '@session_team_expired_alpha'
        player: '@player_shevchenko'
        isCaptain: true
        isLegionary: false

App\Classic\Entity\TournamentSessionTeamAnswer:
    answer_expired_1:
        tournamentSessionTeam: '@session_team_expired_alpha'
        questionNumber: 1
        isCorrect: true
    answer_expired_2:
        tournamentSessionTeam: '@session_team_expired_alpha'
        questionNumber: 2
        isCorrect: false
    answer_expired_3:
        tournamentSessionTeam: '@session_team_expired_alpha'
        questionNumber: 3
        isCorrect: false
