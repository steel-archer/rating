name: DAST (OWASP ZAP)

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  zap-scan:
    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:9.3
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: rating
          MYSQL_USER: rating_user
          MYSQL_PASSWORD: rating_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: mysql://rating_user:rating_pass@127.0.0.1:3306/rating?serverVersion=9.3&charset=utf8mb4
      APP_ENV: prod
      APP_SECRET: dast_secret_key_change_me
      GOOGLE_CLIENT_ID: fake
      GOOGLE_CLIENT_SECRET: fake

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_mysql

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      - name: Setup database
        run: |
          php bin/console doctrine:migrations:migrate --no-interaction
          php bin/console cache:clear

      - name: Start application
        run: |
          php -S 0.0.0.0:8080 -t public/ > /dev/null 2>&1 &
          for i in $(seq 1 10); do curl -sf http://localhost:8080/ > /dev/null && break || sleep 1; done

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8080/'
          rules_file_name: '.github/zap-rules.tsv'
          fail_action: true
          allow_issue_writing: true
          issue_title: 'ZAP Baseline Scan Report'
