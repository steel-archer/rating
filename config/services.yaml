# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    _instanceof:
        App\Mapping\MappingInterface:
            tags: ['app.mapping']

    App\:
        resource: '../src/'

    App\Mapping\Mapper:
        arguments:
            $mappings: !tagged_iterator app.mapping
