security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Common\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            entry_point: App\Common\Security\GoogleAuthenticator
            custom_authenticators:
                - App\Common\Security\GoogleAuthenticator
            access_denied_handler: App\Common\Security\AccessDeniedHandler
            login_throttling:
                max_attempts: 5
                interval: '1 minute'
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 31536000
                always_remember_me: true
                signature_properties: [googleId]
            logout:
                path: auth_logout

    role_hierarchy:
        ROLE_ADMIN: ROLE_MODERATOR
        ROLE_MODERATOR: ROLE_PLAYER
        ROLE_PLAYER: ROLE_USER

    access_control:
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/license$, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }
        - { path: ^/moderator, roles: ROLE_MODERATOR }
        - { path: ^/player-claim, roles: ROLE_USER }
        - { path: ^/api/players/suggest, roles: ROLE_USER }
        - { path: ^/api/towns/suggest, roles: ROLE_USER }
        # Catch-all: all other routes require a linked player
        - { path: ^/, roles: ROLE_PLAYER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
