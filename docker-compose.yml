services:
  app:
    build: ./docker
    ports:
      - "8080:80"
    volumes:
      - ./project:/var/www/html
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: rating
      MYSQL_USER: rating_user
      MYSQL_PASSWORD: rating_pass

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: rating
      MYSQL_USER: rating_user
      MYSQL_PASSWORD: rating_pass
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
